<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Motor Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .dashboard-container {
            display: grid;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            grid-template-columns: repeat(2, 1fr);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            justify-items: center;
            width: max-content;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #rpm { font-size: 3rem; color: white; }
        #control-target { font-size: 3rem; color: white; }
        #status { color: green; }
        #calibrating-step { font-size: 3rem; color: white; }
        #emergency-status { font-size: 3rem; color: green; }
        h1 {
            margin-bottom: 50px;
            font-weight: 300;
        }
        #heading {
            font-size: 3rem;
        }
        #pid-output {
            display: none;
            font-weight: bold;
            color: #00bcd4;
        }
    </style>
</head>
<body>
    <h1 id="heading">ESP32 Motor Driver Control Dashboard</h1>
    <div class="dashboard-container">
        <div class="card">
            <h1>Calibrating Status</h1>
            <div id="calibrating-step">0/5</div>
            <p><span id="calibrating-test">No calibration in progress</span></p>
        </div>
        <div class="card">
            <h1>Motor RPM</h1>
            <div id="rpm">0.00</div>
            <p>Connection Status: <span id="status">Connected</span></p>
        </div>
        <div class="card">
            <h1>Control Mode</h1>
            <div id="control-target">0</div>
            <p><span id="pid-output">0</span></p>
            <p>Mode: <span id="control-mode">N/A</span></p>
        </div>
        <div class="card">
            <h1>Status</h1>
            <div id="emergency-status">Healthy</div>
            <p>Rotation: <span id="rotation-count">N/A</span></p>
            <p>Pot value: <span id="pot-value">N/A</span></p>
        </div>
    </div>
    <script>
        var gateway = `ws://${window.location.hostname}/ws`;
        var websocket;
        window.addEventListener('load', () => {
            websocket = new WebSocket(gateway);
            websocket.onmessage = (event) => {
                let data = JSON.parse(event.data);

                document.getElementById('rpm').innerHTML = data.rpm;

                let color = "white";
                if(data.trend === 0) color = "#00ff00";
                if(data.trend === 2) color = "#ff4444";
                document.getElementById('rpm').style.color = color;

                let controlMode = "Voltage"
                let controlTarget = data.target_speed;
                let pidElement = document.getElementById("pid-output");
                if (data.control_mode === 1) {
                    controlMode = "RPM";
                    controlTarget = data.target_rpm
                    pidElement.style.display = "block";
                    pidElement.innerHTML = "PID: " + data.pid_output;
                } else {
                    pidElement.style.display = "none";
                }
                document.getElementById('control-mode').innerHTML = controlMode;
                document.getElementById('control-target').innerHTML = controlTarget;

                let testGoal = "No calibration in progress"
                switch (parseInt(data.calibrate_step)) {
                    case 0:
                        testGoal = "No calibration in progress";
                        break;
                    case 1:
                        testGoal = "Minimum motor duty";
                        break;
                    case 2:
                        testGoal = "Maximum motor speed";
                        break;
                    case 3:
                        testGoal = "50% motor speed";
                        break;
                    case 4:
                        testGoal = "80% motor speed";
                        break;
                    case 5:
                        testGoal = "Waiting for confirmation to finish";
                        break;
                }
                document.getElementById('calibrating-step').innerHTML = parseInt(data.calibrate_step) + "/5";
                document.getElementById('calibrating-test').innerHTML = testGoal;

                document.getElementById('rotation-count').innerHTML = data.rotation;
                document.getElementById('pot-value').innerHTML = data.pot;
                if (data.emergency) {
                    document.getElementById('emergency-status').innerHTML = "Emergency!";
                    document.getElementById('emergency-status').style.color = "red";
                } else {
                    document.getElementById('emergency-status').innerHTML = "Healthy!";
                    document.getElementById('emergency-status').style.color = "green";
                }
            };

            websocket.onclose = (event) => {
                let status = document.getElementById('status');
                status.innerHTML = "Disconnected";
                status.style.color = "red";
                document.getElementById('rpm').innerHTML = 0.00;
                setTimeout(() => { window.location.reload(); }, 2000);
            };
        });
    </script>
</body>
</html>
